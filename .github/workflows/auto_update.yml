name: Hub Auto Update with Gemini

on:
  schedule:
    - cron: '0 0 * * *' # Se réveille automatiquement toutes les nuits à minuit
  workflow_dispatch: # Te donne un bouton sur GitHub pour le lancer manuellement quand tu veux

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Connexion au dépôt
      uses: actions/checkout@v3

    - name: Configuration de Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installation de la bibliothèque Gemini
      run: |
        pip install google-generativeai

    - name: Exécution du script de mise à jour
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Injecte ta clé secrète en toute sécurité
      run: python update_faq.py

    - name: Sauvegarde et déploiement sur le site en ligne
      run: |
        git config --global user.name 'GeminiBot'
        git config --global user.email 'bot@lytechub.com'
        git add index.html
        git commit -m "Mise à jour automatique des FAQ par Gemini" || exit 0
        git push

